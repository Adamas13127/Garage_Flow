# Ce fichier expose les ports locaux des services Docker du backend.
# Il existe pour faciliter les tests de developpement avec MySQL et Mailpit.
services:
  database:
    ports:
      - "3306:3306"

  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1