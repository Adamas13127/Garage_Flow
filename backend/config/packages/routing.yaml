# Ce fichier configure le routage Symfony du backend GarageFlow.
# Il existe pour generer correctement les URL, meme depuis la console.
# Il utilise DEFAULT_URI defini dans les variables d'environnement.
framework:
    router:
        # Configure how to generate URLs in non-HTTP contexts, such as CLI commands.
        # See https://symfony.com/doc/current/routing.html#generating-urls-in-commands
        default_uri: '%env(DEFAULT_URI)%'

when@prod:
    framework:
        router:
            strict_requirements: null
