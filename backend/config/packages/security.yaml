# Ce fichier prepare la securite Symfony du backend GarageFlow.
# Il existe pour proteger les routes API et brancher le login JWT.
# Il communique avec User, le provider Doctrine et LexikJWTAuthenticationBundle.
security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_ADMIN: [ROLE_GERANT, ROLE_EMPLOYE, ROLE_CLIENT]
        ROLE_GERANT: [ROLE_EMPLOYE, ROLE_CLIENT]
        ROLE_EMPLOYE: [ROLE_CLIENT]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        login:
            pattern: ^/api/auth/login$
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider

    access_control:
        - { path: ^/api/auth/register/client$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/garages, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
